<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/layout.html}">
<head>
    <meta charset="UTF-8">
    <title>상품 추가</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        legend {
            font-weight: bold;
            font-size: 24px; /* 원하는 크기로 조절 */
        }
    </style>
</head>



<body>
<div layout:fragment="content">
    <form action="/admin/product/assignfl" method="get">

        <table>
            <tr>
                <td>
                    <span th:text="${product.packName}"></span>
                    <input type="hidden" id="pdn" name="pdn" th:value="${product.prodNo}">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="datetime-local" id="dptime" name="dptime" placeholder="출발 일자">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="datetime-local" id="artime" name="artime" placeholder="도착 일자">
                </td>
            </tr>
            <tr>
                <td>
                <select id="aircrafts" name="aircrafts">
                    <option value="">선택하세요</option>
                    <option th:each="aircraft : ${aircrafts}"
                            th:value="${aircraft.id}"
                            th:text="${aircraft.name}+ '/' +  ${aircraft.company}"></option>
                </select>
                </td>
            </tr>
            <button type="submit"> 배정 하기 </button>


        </table>





    </form>


</div>
</body>
</html>
